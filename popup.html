<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Copics</title>
    <style>
        :root {
            --wine: rgb(110, 26, 55);
            --rose: rgb(174, 36, 72);
            --teal: rgb(114, 186, 169);
            --mint: rgb(213, 231, 181);
            --ink: rgb(42, 16, 28);
            --paper: #ffffff;
            --shadow: rgba(47, 16, 30, 0.18);
        }
        body {
            width: 320px;
            min-height: 220px;
            padding: 10px;
            font-family: "Aptos", "Candara", "Calibri", "Trebuchet MS", sans-serif;
            background: var(--teal);
            margin: 0;
            border-radius: 18px;
            color: var(--ink);
        }
        .container {
            background: var(--mint);
            border-radius: 18px;
            padding: 16px;
            border: 0;
            
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0.3px;
        }
        .subtitle {
            margin: 2px 0 0 0;
            font-size: 12px;
            color: rgba(42, 16, 28, 0.6);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: transform 0.05s ease, filter 0.2s ease, box-shadow 0.2s ease;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(180deg, var(--rose) 0%, var(--wine) 100%);
            box-shadow: 0 8px 18px rgba(110, 26, 55, 0.28);
        }
        .btn-secondary {
            background: linear-gradient(180deg, rgba(114, 186, 169, 0.85) 0%, rgba(114, 186, 169, 1) 100%);
            color: rgb(20, 52, 46);
            box-shadow: 0 6px 14px rgba(114, 186, 169, 0.25);
        }
        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(42, 16, 28, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>Copics</h2>
                <p class="subtitle">Výrez textu pomocou jedného kliku</p>
            </div>
        </div>
        <div class="btn-group" id="mainButtons">
            <button class="btn-primary" id="selectAreaBtn">Vybrat oblast</button>
            <button class="btn-secondary" id="refreshBtn">Reload stranky</button>
        </div>
        <div class="hint">Tip: vyber presne len cast s textom.</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
